name: local-check

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: pip install pyyaml

      - name: Run checker
        run: python checker/check.py
